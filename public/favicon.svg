<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81d4fa"/>
      <stop offset="100%" stop-color="#00b4db"/>
    </linearGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff69b4"/>
      <stop offset="100%" stop-color="#e040a0"/>
    </linearGradient>
  </defs>

  <!-- sky background -->
  <rect width="512" height="512" fill="url(#bg)" rx="100"/>

  <!-- sand -->
  <rect x="0" y="420" width="512" height="92" fill="#ffe082" rx="100"/>

  <!-- surfboard -->
  <g transform="translate(256, 340)">
    <ellipse cx="0" cy="0" rx="130" ry="40" fill="#ffeb3b" stroke="#fbc02d" stroke-width="8"/>
  </g>

  <!-- princess body (dress) -->
  <g transform="translate(256, 280)">
    <path d="M-50,20 L50,20 L70,-30 L-70,-30 Z" fill="url(#dress)" stroke="#c2185b" stroke-width="3"/>
  </g>

  <!-- head -->
  <circle cx="256" cy="210" r="45" fill="#ffe4c4" stroke="#e0c090" stroke-width="3"/>

  <!-- crown -->
  <g transform="translate(256, 175)">
    <path d="M-30,10 L-25,-20 L-10,-5 L0,-30 L10,-5 L25,-20 L30,10 Z" fill="#ffd700" stroke="#f9a825" stroke-width="2"/>
    <circle cx="-10" cy="-12" r="5" fill="#e91e63"/>
    <circle cx="0" cy="-22" r="5" fill="#e91e63"/>
    <circle cx="10" cy="-12" r="5" fill="#e91e63"/>
    <rect x="-30" y="10" width="60" height="6" fill="#ffd700" rx="2"/>
  </g>

  <!-- eyes -->
  <g fill="#333">
    <ellipse cx="238" cy="210" rx="8" ry="10"/>
    <ellipse cx="274" cy="210" rx="8" ry="10"/>
  </g>
  <g fill="white">
    <circle cx="241" cy="206" r="3"/>
    <circle cx="277" cy="206" r="3"/>
  </g>

  <!-- blush -->
  <ellipse cx="222" cy="225" rx="10" ry="6" fill="#ff9999" opacity="0.5"/>
  <ellipse cx="290" cy="225" rx="10" ry="6" fill="#ff9999" opacity="0.5"/>

  <!-- arms -->
  <g stroke="url(#dress)" stroke-width="12" stroke-linecap="round" fill="none">
    <path d="M206,280 Q180,260 170,240"/>
    <path d="M306,280 Q332,260 342,240"/>
  </g>

  <!-- star accents -->
  <g fill="#ffeb3b" opacity="0.8">
    <polygon points="100,100 106,118 124,118 109,129 114,148 100,137 86,148 91,129 76,118 94,118"/>
    <polygon points="420,80 424,92 436,92 427,99 430,112 420,104 410,112 413,99 404,92 416,92"/>
    <polygon points="400,180 403,188 411,188 405,193 407,202 400,196 393,202 395,193 389,188 397,188"/>
  </g>
</svg>
