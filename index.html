<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosalina's Rainbow Lumas</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050b24;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px #000;
            font-size: 24px;
            z-index: 5;
        }

        #start-screen, #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            background: #4a90e2;
            color: white;
            border: 4px solid #fff;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #357abd;
        }

        canvas {
            display: block;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div>Level: <span id="level-val">1</span></div>
            <div>Time: <span id="timer-val">30</span>s</div>
            <div>Lumas Left: <span id="luma-val">0</span></div>
        </div>

        <div id="start-screen">
            <h1>Rosalina's Rainbow Lumas</h1>
            <p>Drag the colorful stars back to Rosalina in the center!</p>
            <button onclick="startGame()">START GAME</button>
        </div>

        <div id="game-over" class="hidden">
            <h1 id="over-title">Game Over!</h1>
            <p id="over-msg">The stars drifted too far away.</p>
            <button onclick="location.reload()">TRY AGAIN</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const levelDisplay = document.getElementById('level-val');
    const timerDisplay = document.getElementById('timer-val');
    const lumaDisplay = document.getElementById('luma-val');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over');

    let level = 1;
    let timeLeft = 30;
    let lumas = [];
    let isPlaying = false;
    let draggedLuma = null;
    let gameTimer = null;
    let audioCtx = null;

    const LUMA_SIZE = 20;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- AUDIO ENGINE ---
    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    // Chime frequency based on Luma Hue (0-360)
    function playChime(hue) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        // Map hue (0-360) to frequency (261Hz to 880Hz)
        const freq = 261.63 + (hue / 360) * (880 - 261.63);
        
        osc.type = 'triangle'; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + 0.1);
        
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function startMusic() {
        const notes = [261.63, 329.63, 392.00, 523.25];
        let step = 0;
        setInterval(() => {
            if(!isPlaying) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
            step++;
        }, 500);
    }

    // --- GAME OBJECTS ---
    class Luma {
        constructor() {
            this.x = Math.random() * (canvas.width - 100) + 50;
            this.y = Math.random() * (canvas.height - 100) + 50;
            this.baseX = this.x;
            this.baseY = this.y;
            this.offset = Math.random() * Math.PI * 2;
            this.hue = Math.random() * 360; // Rainbow Hue
            this.color = `hsl(${this.hue}, 100%, 70%)`;
        }

        update() {
            if (this !== draggedLuma) {
                this.x = this.baseX + Math.sin(Date.now() / 1000 + this.offset) * 20;
                this.y = this.baseY + Math.cos(Date.now() / 1000 + this.offset) * 20;
            }
        }

        drawStar(cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
        }

        draw() {
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            
            // Rounded edge effect using lineJoin and a thick stroke
            ctx.lineJoin = 'round';
            ctx.lineWidth = 4;
            
            this.drawStar(this.x, this.y, 5, LUMA_SIZE, LUMA_SIZE / 2);
            ctx.fill();
            ctx.stroke(); 
            ctx.restore();
            
            // Eyes
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(this.x - 4, this.y - 2, 2, 0, Math.PI*2);
            ctx.arc(this.x + 4, this.y - 2, 2, 0, Math.PI*2);
            ctx.fill();
        }
    }

    function drawRosalina() {
        const rx = canvas.width / 2;
        const ry = canvas.height / 2;

        // Throne
        ctx.fillStyle = "#ffd700";
        ctx.fillRect(rx - 40, ry, 80, 30);
        ctx.fillRect(rx - 30, ry - 30, 60, 30);

        // Rosalina (Simple 16-bit representation)
        ctx.fillStyle = "#4a90e2"; // Blue Dress
        ctx.beginPath();
        ctx.moveTo(rx, ry - 10);
        ctx.lineTo(rx - 20, ry + 10);
        ctx.lineTo(rx + 20, ry + 10);
        ctx.fill();

        ctx.fillStyle = "#ffe0bd"; // Skin
        ctx.beginPath();
        ctx.arc(rx, ry - 20, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#fdf5e6"; // Hair
        ctx.beginPath();
        ctx.arc(rx, ry - 25, 14, Math.PI, 0);
        ctx.fill();
        ctx.fillRect(rx + 10, ry - 25, 8, 20);

        ctx.fillStyle = "gold"; // Crown
        ctx.fillRect(rx - 5, ry - 35, 10, 5);
    }

    function spawnLumas() {
        lumas = [];
        const count = 5 + (level * 3);
        for (let i = 0; i < count; i++) {
            lumas.push(new Luma());
        }
        lumaDisplay.innerText = lumas.length;
    }

    function startGame() {
        initAudio();
        startMusic();
        startScreen.classList.add('hidden');
        isPlaying = true;
        level = 1;
        startLevel();
    }

    function startLevel() {
        timeLeft = Math.max(10, 30 - (level * 2));
        levelDisplay.innerText = level;
        timerDisplay.innerText = timeLeft;
        spawnLumas();

        if(gameTimer) clearInterval(gameTimer);
        gameTimer = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) endGame(false);
        }, 1000);
    }

    function endGame(win) {
        isPlaying = false;
        clearInterval(gameTimer);
        gameOverScreen.classList.remove('hidden');
        document.getElementById('over-title').innerText = win ? "You Won!" : "Game Over!";
        document.getElementById('over-msg').innerText = win ? "All Lumas are safe!" : "Time ran out!";
    }

    canvas.addEventListener('mousedown', (e) => {
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        lumas.forEach(luma => {
            const dist = Math.hypot(luma.x - mouseX, luma.y - mouseY);
            if (dist < LUMA_SIZE * 2) draggedLuma = luma;
        });
    });

    window.addEventListener('mousemove', (e) => {
        if (draggedLuma) {
            draggedLuma.x = e.clientX;
            draggedLuma.y = e.clientY;
        }
    });

    window.addEventListener('mouseup', () => {
        draggedLuma = null;
    });

    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        const mouseX = touch.clientX;
        const mouseY = touch.clientY;
        lumas.forEach(luma => {
            const dist = Math.hypot(luma.x - mouseX, luma.y - mouseY);
            if (dist < LUMA_SIZE * 2) draggedLuma = luma;
        });
    });
    window.addEventListener('touchmove', (e) => {
        if (draggedLuma) {
            const touch = e.touches[0];
            draggedLuma.x = touch.clientX;
            draggedLuma.y = touch.clientY;
        }
    });
    window.addEventListener('touchend', () => { draggedLuma = null; });

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawRosalina();

        if (isPlaying) {
            lumas.forEach((luma, index) => {
                luma.update();
                luma.draw();

                const rx = canvas.width / 2;
                const ry = canvas.height / 2;
                const dist = Math.hypot(luma.x - rx, luma.y - ry);

                if (dist < 60) {
                    playChime(luma.hue);
                    lumas.splice(index, 1);
                    lumaDisplay.innerText = lumas.length;
                    
                    if (lumas.length === 0) {
                        level++;
                        startLevel();
                    }
                }
            });
        }
        requestAnimationFrame(loop);
    }

    function createStars() {
        const container = document.getElementById('game-container');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            container.appendChild(star);
        }
    }

    createStars();
    loop();
</script>
</body>
</html>
