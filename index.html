                            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosalina's Luma Gathering</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050b24;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }

        /* Starry Background */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px #000;
            font-size: 24px;
        }

        #start-screen, #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            background: #4a90e2;
            color: white;
            border: 4px solid #fff;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #357abd;
        }

        canvas {
            display: block;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div>Level: <span id="level-val">1</span></div>
            <div>Time: <span id="timer-val">30</span>s</div>
            <div>Lumas Left: <span id="luma-val">0</span></div>
        </div>

        <div id="start-screen">
            <h1>Rosalina's Luma Gathering</h1>
            <p>Drag the floating Lumas back to Rosalina's throne!</p>
            <button onclick="startGame()">START GAME</button>
        </div>

        <div id="game-over" class="hidden">
            <h1 id="over-title">Game Over!</h1>
            <p id="over-msg">The stars drifted too far away.</p>
            <button onclick="location.reload()">TRY AGAIN</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const levelDisplay = document.getElementById('level-val');
    const timerDisplay = document.getElementById('timer-val');
    const lumaDisplay = document.getElementById('luma-val');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over');

    // Game State
    let level = 1;
    let timeLeft = 30;
    let lumas = [];
    let isPlaying = false;
    let draggedLuma = null;
    let gameTimer = null;
    let audioCtx = null;

    // Config
    const ROSALINA_SIZE = 60;
    const LUMA_SIZE = 15;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- AUDIO ENGINE (16-bit style) ---
    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playChime() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle'; 
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
        osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); // C6
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function startMusic() {
        const notes = [261.63, 329.63, 392.00, 523.25]; // C Major chord
        let step = 0;
        
        setInterval(() => {
            if(!isPlaying) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square'; // Classic NES/SNES sound
            osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
            step++;
        }, 500);
    }

    // --- GAME OBJECTS ---
    class Luma {
        constructor() {
            this.x = Math.random() * (canvas.width - 100) + 50;
            this.y = Math.random() * (canvas.height - 200) + 50;
            this.baseX = this.x;
            this.baseY = this.y;
            this.offset = Math.random() * Math.PI * 2;
            this.color = `hsl(${Math.random() * 60 + 40}, 100%, 70%)`;
        }

        update() {
            if (this !== draggedLuma) {
                // Floating movement
                this.x = this.baseX + Math.sin(Date.now() / 1000 + this.offset) * 20;
                this.y = this.baseY + Math.cos(Date.now() / 1000 + this.offset) * 20;
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, LUMA_SIZE, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Little eyes
            ctx.fillStyle = "black";
            ctx.fillRect(this.x - 4, this.y - 4, 2, 2);
            ctx.fillRect(this.x + 2, this.y - 4, 2, 2);
        }
    }

    function drawRosalina() {
        const rx = canvas.width - 100;
        const ry = canvas.height - 100;

        // Throne
        ctx.fillStyle = "#ffd700";
        ctx.fillRect(rx - 40, ry, 80, 40);
        ctx.fillRect(rx - 30, ry - 40, 60, 40);

        // Rosalina (Simple 16-bit representation)
        // Dress
        ctx.fillStyle = "#4a90e2";
        ctx.beginPath();
        ctx.moveTo(rx, ry - 20);
        ctx.lineTo(rx - 20, ry);
        ctx.lineTo(rx + 20, ry);
        ctx.fill();

        // Head
        ctx.fillStyle = "#ffe0bd";
        ctx.beginPath();
        ctx.arc(rx, ry - 30, 12, 0, Math.PI * 2);
        ctx.fill();

        // Hair (Platinum blonde)
        ctx.fillStyle = "#fdf5e6";
        ctx.beginPath();
        ctx.arc(rx, ry - 35, 14, Math.PI, 0);
        ctx.fill();
        ctx.fillRect(rx + 10, ry - 35, 8, 20);

        // Crown
        ctx.fillStyle = "gold";
        ctx.fillRect(rx - 5, ry - 45, 10, 5);
    }

    // --- CORE LOGIC ---
    function spawnLumas() {
        lumas = [];
        const count = 5 + (level * 3);
        for (let i = 0; i < count; i++) {
            lumas.push(new Luma());
        }
        lumaDisplay.innerText = lumas.length;
    }

    function startGame() {
        initAudio();
        startMusic();
        startScreen.classList.add('hidden');
        isPlaying = true;
        level = 1;
        startLevel();
    }

    function startLevel() {
        timeLeft = Math.max(10, 30 - (level * 2));
        levelDisplay.innerText = level;
        timerDisplay.innerText = timeLeft;
        spawnLumas();

        if(gameTimer) clearInterval(gameTimer);
        gameTimer = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) endGame(false);
        }, 1000);
    }

    function endGame(win) {
        isPlaying = false;
        clearInterval(gameTimer);
        gameOverScreen.classList.remove('hidden');
        document.getElementById('over-title').innerText = win ? "You Won!" : "Game Over!";
        document.getElementById('over-msg').innerText = win ? "All Lumas are safe!" : "Time ran out!";
    }

    // --- INPUT ---
    canvas.addEventListener('mousedown', (e) => {
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        lumas.forEach(luma => {
            const dist = Math.hypot(luma.x - mouseX, luma.y - mouseY);
            if (dist < LUMA_SIZE * 2) draggedLuma = luma;
        });
    });

    window.addEventListener('mousemove', (e) => {
        if (draggedLuma) {
            draggedLuma.x = e.clientX;
            draggedLuma.y = e.clientY;
        }
    });

    window.addEventListener('mouseup', () => {
        draggedLuma = null;
    });

    // Touch support
    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        const mouseX = touch.clientX;
        const mouseY = touch.clientY;
        lumas.forEach(luma => {
            const dist = Math.hypot(luma.x - mouseX, luma.y - mouseY);
            if (dist < LUMA_SIZE * 2) draggedLuma = luma;
        });
    });
    window.addEventListener('touchmove', (e) => {
        if (draggedLuma) {
            const touch = e.touches[0];
            draggedLuma.x = touch.clientX;
            draggedLuma.y = touch.clientY;
        }
    });
    window.addEventListener('touchend', () => { draggedLuma = null; });

    // --- GAME LOOP ---
    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawRosalina();

        if (isPlaying) {
            lumas.forEach((luma, index) => {
                luma.update();
                luma.draw();

                // Check if Luma reached Rosalina
                const rx = canvas.width - 100;
                const ry = canvas.height - 100;
                const dist = Math.hypot(luma.x - rx, luma.y - ry);

                if (dist < 50) {
                    playChime();
                    lumas.splice(index, 1);
                    lumaDisplay.innerText = lumas.length;
                    
                    if (lumas.length === 0) {
                        level++;
                        startLevel();
                    }
                }
            });
        }

        requestAnimationFrame(loop);
    }

    // Create Background Stars
    function createStars() {
        const container = document.getElementById('game-container');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            container.appendChild(star);
        }
    }

    createStars();
    loop();
</script>
</body>
</html>
